<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TaGSense{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/shocked.png') }}">
  <script src="{{ url_for('static', filename='js/chart.umd.min.js') }}"></script>
</head>
<body>

  <nav class="navbar">
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'landing' %}active{% endif %}">Home</a>
      <a href="/analyze" class="nav-link {% if request.endpoint == 'index'   %}active{% endif %}">Analyze</a>
      <a href="/batch"   class="nav-link {% if request.endpoint == 'batch'   %}active{% endif %}">Batch</a>
      <a href="/compare" class="nav-link {% if request.endpoint == 'compare' %}active{% endif %}">Compare</a>
      <a href="/history" class="nav-link {% if request.endpoint == 'history' %}active{% endif %}">History</a>
      <a href="/about"   class="nav-link {% if request.endpoint == 'about'   %}active{% endif %}">About</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
